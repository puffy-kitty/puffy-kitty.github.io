<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Puffy Kitty Crochet Patterns</title>
    <meta
      name="description"
      content="Puffy Kitty 的原创钩针图解发布页，可在线阅读并下载图片或 PDF。"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="scripts.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#/" aria-label="Puffy Kitty 首页">
        <span class="brand-mark">PK</span>
        <span>
          <span class="brand-name">Puffy Kitty</span>
          <span class="brand-subtitle">Crochet Patterns</span>

      <nav aria-label="主导航">
        <a href="#/">图解</a>
        <a href="#/about">说明</a>
        <a href="#/contact">联系</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">原创钩针图解</p>
          <h1>每个图解单独展示，支持中式、US、UK 记号切换。</h1>
          <p>
            首页保留卡片列表。点进二级页面后，可以阅读完整图解，并按当前语言生成图片或 PDF。
          </p>
        </div>
        <div class="hero-panel" aria-hidden="true">
          <div class="stitch-grid">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>

        </div>
      </section>

      <section id="app" class="section app-shell" aria-live="polite"></section>
    </main>

    <footer>
      <p>© 2026 Puffy Kitty。网站代码可开源，原创图解版权归设计者所有。</p>
    </footer>
  </body>
