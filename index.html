<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Puffy Kitty Crochet Patterns</title>
    <meta
      name="description"
      content="Puffy Kitty 的原创钩针图解发布页，可在线阅读并下载图片或 PDF。"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="scripts.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#/" aria-label="Puffy Kitty 首页">
        <span class="brand-mark">PK</span>
        <span>
          <span class="brand-name">Puffy Kitty</span>
          <span class="brand-subtitle">Crochet Patterns</span>
        </span>
      </a>
      <nav aria-label="主导航">
        <a href="#/">pattern</a>
        <a href="#/gallery">gallery</a>
        <a href="#/contact">contact</a>
        <a href="#/about">about</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">原创钩针图解</p>
          <h1>像手帐一样整理每一份钩针图解。</h1>
          <p>
            延续浅蓝底、粗黑圆润字、手绘标注和贴纸感图片的风格。点进二级页面后，可以切换中文、US、UK 记号，并按当前语言生成图片或 PDF。
          </p>
        </div>
        <div class="hero-panel scrapbook-panel" aria-hidden="true">
          <img src="assets/larvitar-pattern-1.jpeg" alt="" />
          <div class="doodle-heart">♥</div>
          <div class="doodle-face">^^</div>
          <div class="doodle-caption">pattern notes</div>
        </div>
      </section>

      <section id="app" class="section app-shell" aria-live="polite"></section>
    </main>

    <footer>
      <p>© 2026 Puffy Kitty。网站代码可开源，原创图解版权归设计者所有。</p>
    </footer>
  </body>
</html>
